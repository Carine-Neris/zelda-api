name: Deploy FastAPI para a Azure

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      # 1. Instala o Poetry para gerenciar o ambiente de testes
      - name: Instalar o Poetry
        run: |
          pipx install poetry

      # 2. Instala as dependências mapeadas no pyproject.toml
      - name: Instalar dependências com Poetry
        run: |
          poetry install --no-root

      # 3. Roda os testes isolados (o Poetry ignora lixo da raiz)
      - name: Executar testes com Pytest
        run: |
          poetry run pytest

      # 4. Envia o código limpo para a Azure (que usará seu requirements.txt)
      - name: Fazer deploy para o Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'zelda'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .